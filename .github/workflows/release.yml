name: Release

# Publish a Foundry-installable release whenever you push a version tag, e.g.:
#   git tag v1.0.1 && git push origin v1.0.1
# Foundry installs/updates from the manifest URL in module.json; this workflow
# builds the release assets (module.json + module.zip) that URL resolves to.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Strip the leading "v" from the tag -> the bare version (e.g. 1.0.1).
      - name: Read version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Pin version + URLs into module.json for this release. The committed
      # module.json keeps the "latest" download URL; here we pin it to this
      # exact tag so the version is reproducible and immutable.
      - name: Patch module.json
        uses: microsoft/variable-substitution@v1
        with:
          files: module.json
        env:
          version: ${{ steps.version.outputs.value }}
          manifest: https://github.com/${{ github.repository }}/releases/latest/download/module.json
          download: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.zip

      # Foundry expects module.json at the zip root, so build the zip ourselves.
      - name: Build module.zip
        run: zip -r module.zip module.json scripts README.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            module.json
            module.zip
